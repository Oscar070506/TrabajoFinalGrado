<div class="tabs-bar">
  <button
    class="tab-btn"
    [class.active]="activeTab === 'full-game-runs'"
    (click)="setTab('full-game-runs')">
    Full Game Runs
  </button>
  <button
    class="tab-btn"
    [class.active]="activeTab === 'level-runs'"
    (click)="setTab('level-runs')">
    Level Runs
  </button>
  <button
    class="tab-btn"
    [class.active]="activeTab === 'about'"
    (click)="setTab('about')">
    About
  </button>
</div>

<div class="tab-content">
  @switch (activeTab) {
    @case ('full-game-runs') {
      <app-user-full-game-runs [userId]="userId"></app-user-full-game-runs>
    }
    @case ('level-runs') {
      <app-user-level-runs [userId]="userId"></app-user-level-runs>
    }
    @case ('about') {
      <app-user-about [userId]="userId"></app-user-about>
    }
  }
</div>
